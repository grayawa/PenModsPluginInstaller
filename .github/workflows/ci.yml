name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_MODE: debug
  GCC_BASE_URL: https://github.com/Redbeanw44602/aarch64-linux-gnu-gcc-6.5.0/releases/download/6.5.0
  XMAKE_ROOT: y

jobs:
  build:
    name: Build plugin and device CLI
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git curl file xmake \
            qt5-base qt5-declarative

      - name: Install aarch64 glibc 2.27 toolchain
        run: |
          curl -L --fail -o aarch64-linux-gnu-binutils-2.30-1-x86_64.pkg.tar.zst \
            "$GCC_BASE_URL/aarch64-linux-gnu-binutils-2.30-1-x86_64.pkg.tar.zst"
          curl -L --fail -o aarch64-linux-gnu-glibc-2.27-1-any.pkg.tar.zst \
            "$GCC_BASE_URL/aarch64-linux-gnu-glibc-2.27-1-any.pkg.tar.zst"
          curl -L --fail -o aarch64-linux-gnu-gcc-6.5.0-1-x86_64.pkg.tar.zst \
            "$GCC_BASE_URL/aarch64-linux-gnu-gcc-6.5.0-1-x86_64.pkg.tar.zst"
          pacman -U --noconfirm \
            aarch64-linux-gnu-binutils-2.30-1-x86_64.pkg.tar.zst \
            aarch64-linux-gnu-glibc-2.27-1-any.pkg.tar.zst \
            aarch64-linux-gnu-gcc-6.5.0-1-x86_64.pkg.tar.zst
          aarch64-linux-gnu-gcc --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Qt plugin and host CLI
        run: |
          xmake f -m "$BUILD_MODE" -y
          xmake -v

      - name: Build aarch64 manual installer CLI
        run: bash scripts/build-cli-aarch64.sh "$BUILD_MODE"

      - name: Package plugin
        run: bash scripts/package.sh "$BUILD_MODE"

      - name: Verify package
        run: |
          test -f package/plugin_installer/metadata.json
          test -f package/plugin_installer/main.qml
          test -f package/plugin_installer/libplugin_installer.so
          test -f package/plugin_installer/bin/penmods-plugin
          file package/plugin_installer/bin/penmods-plugin | grep -q "ARM aarch64"
          aarch64-linux-gnu-readelf --version-info package/plugin_installer/bin/penmods-plugin \
            | grep -q "GLIBC_2.17"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-installer-package
          path: package/plugin_installer
